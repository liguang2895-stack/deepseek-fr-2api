[server]
host = "0.0.0.0"
port = 8000
log_level = "INFO"

[security]
# 下游客户端鉴权。为空数组则不鉴权；建议实际部署时改成自己的 key。
api_keys = ["sk-dsfr-local-change-me"]

[proxy]
# 支持 http:// / https:// / socks5://。留空则直连。
url = ""

[upstream]
timeout = 60.0
stream_timeout = 300.0
config_ttl_seconds = 60
auto_refresh = true
refresh_retries = 4
retry_backoff_seconds = 1.0
